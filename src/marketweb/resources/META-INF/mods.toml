modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${market_web_mod_id}"
version="${mod_version}"
displayName="${market_web_mod_name}"
authors="${mod_authors}"
displayTest="IGNORE_SERVER_VERSION"
description='''
Server-side market web service addon for ${mod_name}.
'''

[[dependencies.${market_web_mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${market_web_mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${market_web_mod_id}]]
    modId="${mod_id}"
    mandatory=true
    versionRange="[${mod_version},)"
    ordering="AFTER"
    side="BOTH"
